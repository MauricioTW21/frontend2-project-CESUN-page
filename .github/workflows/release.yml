name: Release-Docker

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          # Cambiamos a 'node' para que lea la versión del package.json
          release-type: node

  build-docker:
    needs: release-please
    # Solo ejecuta este trabajo si release-please creó un nuevo release
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y empujar imagen de Docker
        run: |
          # Extraemos la versión generada por release-please (ej. v1.0.1)
          VERSION=${{ needs.release-please.outputs.tag_name }}

          # Actualizamos el nombre del repositorio para reflejar el proyecto frontend
          DOCKER_REPO="${{ secrets.DOCKER_USERNAME }}/proyecto-frontend-ii"

          echo "Construyendo imagen $DOCKER_REPO:$VERSION..."

          # Construimos la imagen 
          docker build -t $DOCKER_REPO:$VERSION .

          # Etiquetamos como 'latest'
          docker tag $DOCKER_REPO:$VERSION $DOCKER_REPO:latest

          echo "Subiendo imágenes a Docker Hub..."

          # Empujamos ambas etiquetas
          docker push $DOCKER_REPO:$VERSION
          docker push $DOCKER_REPO:latest
